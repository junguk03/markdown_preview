<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Preview</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/html.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --border: #333;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #4f9cf9;
      --toolbar-h: 48px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Toolbar */
    .toolbar {
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-right: auto;
    }

    .toolbar h1 span {
      color: var(--accent);
    }

    .btn {
      height: 30px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn:hover {
      background: rgba(255,255,255,0.07);
      border-color: #555;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: #3a8af0;
    }

    .btn svg {
      flex-shrink: 0;
    }

    /* Split layout */
    .split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-header {
      height: 34px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .pane-header span {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.6;
    }

    .divider {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
      cursor: col-resize;
      transition: background 0.15s;
    }

    .divider:hover,
    .divider.dragging {
      background: var(--accent);
    }

    /* Editor */
    #editor {
      flex: 1;
      width: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 20px 24px;
      tab-size: 2;
    }

    /* Preview */
    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      background: #fff;
      color: #1a1a1a;
    }

    /* Markdown styles */
    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      margin: 1.5em 0 0.5em;
      line-height: 1.3;
      font-weight: 700;
    }

    #preview h1 { font-size: 2em; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; border-bottom: 1px solid #e0e0e0; padding-bottom: 0.2em; }
    #preview h3 { font-size: 1.25em; }
    #preview h4 { font-size: 1.1em; }

    #preview p {
      margin: 0.8em 0;
      line-height: 1.8;
    }

    #preview a {
      color: #0969da;
      text-decoration: none;
    }

    #preview a:hover {
      text-decoration: underline;
    }

    #preview ul, #preview ol {
      margin: 0.5em 0;
      padding-left: 1.8em;
    }

    #preview li {
      margin: 0.3em 0;
      line-height: 1.7;
    }

    #preview blockquote {
      border-left: 4px solid #d0d7de;
      margin: 1em 0;
      padding: 0.5em 1em;
      color: #57606a;
      background: #f6f8fa;
      border-radius: 0 6px 6px 0;
    }

    #preview code {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.875em;
      background: #f0f0f0;
      padding: 0.2em 0.4em;
      border-radius: 4px;
      color: #e83e8c;
    }

    #preview pre {
      margin: 1em 0;
      border-radius: 8px;
      overflow: hidden;
    }

    #preview pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: 13px;
      display: block;
      padding: 16px 20px;
    }

    #preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 14px;
    }

    #preview th, #preview td {
      border: 1px solid #d0d7de;
      padding: 8px 12px;
      text-align: left;
    }

    #preview th {
      background: #f6f8fa;
      font-weight: 600;
    }

    #preview tr:nth-child(even) td {
      background: #fafafa;
    }

    #preview img {
      max-width: 100%;
      border-radius: 6px;
    }

    #preview hr {
      border: none;
      border-top: 2px solid #e0e0e0;
      margin: 2em 0;
    }

    #preview input[type="checkbox"] {
      margin-right: 6px;
    }

    /* Scrollbar */
    #preview::-webkit-scrollbar { width: 8px; }
    #preview::-webkit-scrollbar-track { background: #f0f0f0; }
    #preview::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    #editor::-webkit-scrollbar { width: 8px; }
    #editor::-webkit-scrollbar-track { background: #1a1a1a; }
    #editor::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      transition: transform 0.25s ease;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Char count */
    .char-count {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 14px;
      height: 26px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Dark preview toggle */
    #preview.dark {
      background: #1a1a1a;
      color: #e0e0e0;
    }

    #preview.dark h1, #preview.dark h2 {
      border-color: #333;
    }

    #preview.dark blockquote {
      border-left-color: #555;
      background: #242424;
      color: #aaa;
    }

    #preview.dark code {
      background: #2d2d2d;
      color: #e06c75;
    }

    #preview.dark th {
      background: #242424;
    }

    #preview.dark tr:nth-child(even) td {
      background: #1e1e1e;
    }

    #preview.dark th, #preview.dark td {
      border-color: #333;
    }

    #preview.dark a {
      color: #58a6ff;
    }

    #preview.dark hr {
      border-color: #333;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>Markdown <span>Preview</span></h1>
  <button class="btn" id="btnClear" title="에디터 초기화">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4h6v2"/>
    </svg>
    초기화
  </button>
  <button class="btn" id="btnTheme" title="프리뷰 테마 전환">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    라이트 / 다크
  </button>
  <button class="btn primary" id="btnCopy">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    마크다운 복사
  </button>
</div>

<div class="split" id="split">
  <div class="pane" id="editorPane">
    <div class="pane-header">
      Editor
      <span id="lineCount">0 lines</span>
    </div>
    <textarea id="editor" placeholder="마크다운을 입력하세요...

# 제목
**굵게**, *기울임*, ~~취소선~~

- 목록 아이템
- 두 번째 아이템

> 인용문

\`\`\`javascript
console.log('Hello!');
\`\`\`

| 열1 | 열2 |
|-----|-----|
| 값1 | 값2 |
" spellcheck="false"></textarea>
    <div class="char-count" id="charCount">0 characters · 0 words</div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="pane" id="previewPane">
    <div class="pane-header">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const charCount = document.getElementById('charCount');
  const lineCount = document.getElementById('lineCount');
  const toast = document.getElementById('toast');

  // Configure marked
  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  // Custom renderer for syntax highlighting
  const renderer = new marked.Renderer();
  renderer.code = function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try {
        const highlighted = hljs.highlight(code, { language: lang }).value;
        return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
      } catch (e) {}
    }
    return `<pre><code class="hljs">${hljs.highlightAuto(code).value}</code></pre>`;
  };

  // Task list support
  renderer.listitem = function(text) {
    if (/^\[( |x)\] /.test(text)) {
      const checked = text.startsWith('[x]');
      const content = text.replace(/^\[( |x)\] /, '');
      return `<li><input type="checkbox" ${checked ? 'checked' : ''} disabled /> ${content}</li>`;
    }
    return `<li>${text}</li>`;
  };

  marked.use({ renderer });

  function render() {
    const md = editor.value;
    preview.innerHTML = marked.parse(md);

    const chars = md.length;
    const words = md.trim() ? md.trim().split(/\s+/).length : 0;
    const lines = md.split('\n').length;
    charCount.textContent = `${chars.toLocaleString()} characters · ${words.toLocaleString()} words`;
    lineCount.textContent = `${lines.toLocaleString()} lines`;
  }

  editor.addEventListener('input', render);

  // Tab key
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      render();
    }
  });

  // Initial render
  render();

  // Clear
  document.getElementById('btnClear').addEventListener('click', () => {
    if (editor.value && confirm('에디터 내용을 초기화할까요?')) {
      editor.value = '';
      render();
    }
  });

  // Copy markdown
  document.getElementById('btnCopy').addEventListener('click', () => {
    if (!editor.value) return;
    navigator.clipboard.writeText(editor.value).then(() => showToast('클립보드에 복사됐습니다'));
  });

  // Theme toggle
  let isDark = false;
  document.getElementById('btnTheme').addEventListener('click', () => {
    isDark = !isDark;
    preview.classList.toggle('dark', isDark);
  });

  // Toast
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Divider drag (resize panes)
  const divider = document.getElementById('divider');
  const split = document.getElementById('split');
  const editorPane = document.getElementById('editorPane');
  const previewPane = document.getElementById('previewPane');

  let isDragging = false;
  divider.addEventListener('mousedown', (e) => {
    isDragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const rect = split.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const clamped = Math.min(Math.max(ratio, 0.2), 0.8);
    editorPane.style.flex = `0 0 ${clamped * 100}%`;
    previewPane.style.flex = `0 0 ${(1 - clamped) * 100}%`;
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // Persist content in localStorage
  const STORAGE_KEY = 'md-preview-content';
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    editor.value = saved;
    render();
  }

  editor.addEventListener('input', () => {
    localStorage.setItem(STORAGE_KEY, editor.value);
  });
</script>
</body>
</html>
